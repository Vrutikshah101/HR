services:
  mysql:
    image: mysql:8.4
    container_name: leave-mgmt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: leave_management
      MYSQL_USER: leave_app
      MYSQL_PASSWORD: leave_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leave-mgmt-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=leave_management;User=leave_app;Password=leave_app;"
    ports:
      - "5001:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leave-mgmt-web
    environment:
      VITE_API_BASE_URL: http://localhost:5001/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
